<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warframe Mod Browser</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Warframe Mod Browser</h1>
      <span id="meta-info" class="meta-info"></span>
    </div>
  </header>

  <main>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-body">

        <div class="filter-group">
          <label for="search" class="filter-label">Search</label>
          <div class="search-wrapper">
            <input type="search" id="search" placeholder="Mod name, stat, or description...">
            <ul id="autocomplete-list" class="autocomplete-list" hidden></ul>
          </div>
        </div>

        <div class="filter-group collapsible" id="group-type">
          <button class="filter-group-header" aria-expanded="true">
            <span>Mod Type</span>
            <span class="filter-active-count" id="count-type" hidden></span>
            <span class="toggle-arrow">▾</span>
          </button>
          <div class="filter-group-body">
            <div id="filter-type" class="checkbox-list"></div>
          </div>
        </div>

        <div class="filter-group collapsible" id="group-compat">
          <button class="filter-group-header" aria-expanded="true">
            <span>Weapon Category</span>
            <span class="filter-active-count" id="count-compat" hidden></span>
            <span class="toggle-arrow">▾</span>
          </button>
          <div class="filter-group-body">
            <div id="filter-compat" class="checkbox-list"></div>
          </div>
        </div>

        <div class="filter-group collapsible" id="group-stat">
          <button class="filter-group-header" aria-expanded="true">
            <span>Stat Type</span>
            <span class="filter-active-count" id="count-stat" hidden></span>
            <span class="toggle-arrow">▾</span>
          </button>
          <div class="filter-group-body">
            <div id="filter-stat" class="checkbox-list scrollable"></div>
          </div>
        </div>

        <div class="filter-group collapsible" id="group-rarity">
          <button class="filter-group-header" aria-expanded="true">
            <span>Rarity</span>
            <span class="filter-active-count" id="count-rarity" hidden></span>
            <span class="toggle-arrow">▾</span>
          </button>
          <div class="filter-group-body">
            <div id="filter-rarity" class="checkbox-list"></div>
          </div>
        </div>

        <div class="filter-group">
          <label for="drop-search" class="filter-label">Drop Source</label>
          <input type="search" id="drop-search" placeholder="Mission, enemy, relic...">
        </div>

        <button id="clear-filters" class="btn-clear">Clear All Filters</button>
      </div>

      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle filters">Filters</button>
    </aside>

    <section class="content">
      <div class="toolbar">
        <span id="result-count"></span>
        <div id="active-chips" class="active-chips"></div>
        <select id="sort-select">
          <option value="name-asc">Name A-Z</option>
          <option value="name-desc">Name Z-A</option>
          <option value="drain-asc">Drain Low-High</option>
          <option value="drain-desc">Drain High-Low</option>
        </select>
      </div>
      <div id="mod-grid" class="mod-grid"></div>
      <div id="loading" class="loading">Loading mod data...</div>
      <div id="no-results" class="no-results" hidden>No mods match your filters.</div>
      <button id="load-more" class="btn-load-more" hidden>Load More</button>
    </section>
  </main>

  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
