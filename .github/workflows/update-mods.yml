name: Update Mod Data

on:
  schedule:
    # Run every night at 04:00 UTC
    - cron: "0 4 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and merge all data
        run: python scripts/update_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/mods.json \
                  docs/data/weapons.json \
                  docs/data/warframes.json \
                  docs/data/arcanes.json \
                  docs/data/relics.json \
                  docs/data/meta.json
          if git diff --cached --quiet; then
            echo "No data changes detected"
          else
            git commit -m "chore: update all item data $(date -u +%Y-%m-%d)"
            git push
          fi
