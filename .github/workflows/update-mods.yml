name: Update Mod Data
 
on:
  schedule:
    # Run every night at 04:00 UTC
    - cron: "0 4 * * *"
  workflow_dispatch: # Allow manual trigger
 
permissions:
  contents: write
 
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
 
      - name: Fetch and merge mod data
        run: node scripts/merge-mods.js
 
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/mods.json site/data/meta.json
          if git diff --cached --quiet; then
            echo "No data changes detected"
          else
            git commit -m "chore: update mod data $(date -u +%Y-%m-%d)"
            git push
          fi
